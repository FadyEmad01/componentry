name: Validate Registry

on:
  pull_request:
    paths:
      - "apps/web/public/r/**"
      - "apps/web/registry/index.ts"
      - "scripts/validate-registry.js"
      - ".github/workflows/validate-registry.yml"
      - "package.json"
      - "pnpm-lock.yaml"
  push:
    branches:
      - main
    paths:
      - "apps/web/public/r/**"
      - "apps/web/registry/index.ts"
      - "scripts/validate-registry.js"
      - ".github/workflows/validate-registry.yml"
      - "package.json"
      - "pnpm-lock.yaml"

jobs:
  validate-registry:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate shadcn registry files
        run: pnpm validate:registry
